server {
    listen 80;

    # 培训手册站点
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ $uri.html =404;
    }

    # 培训文档下载目录（文件列表自动展示）
    location /downloads/ {
        alias /downloads/;
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;
        charset utf-8;
    }
}
