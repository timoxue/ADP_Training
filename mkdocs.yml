    - 研报问答系统搭建: 03-scenario1-research/rag-qa.md
    - 数据抽取与结构化: 03-scenario1-research/data-extract.md
    - 配置截图与验收: 03-scenario1-research/screenshots.md
  - 场景二·财富投顾:
