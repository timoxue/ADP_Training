site_name: ADP 智能体实战培训
site_description: 腾讯云智能体开发平台 · 证券行业实战培训手册
site_author: ADP 培训团队
docs_dir: docs
site_dir: site

theme:
  name: material
  language: zh
  palette:
    - scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: 切换到深色模式
    - scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-4
        name: 切换到浅色模式
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
  font:
    text: Noto Sans SC
    code: Roboto Mono
  icon:
    repo: fontawesome/brands/github

plugins:
  - search:
      lang: zh

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - 首页: index.md
  - 基础篇:
    - 概览: 01-foundation/index.md
    - LLM · RAG · Agent: 01-foundation/llm-rag-agent.md
    - Skills 与 HARNESS: 01-foundation/skills-harness.md
    - ADP 平台功能总览: 01-foundation/adp-platform.md
    - 四种应用模式: 01-foundation/adp-modes.md
    - 推荐 Skills 分类: 01-foundation/useful-skills.md
  - 方法篇（六步分析法）:
    - 概览: 02-six-step/index.md
    - 六步分析法详解: 02-six-step/method.md
    - 自定义 Skills 准备: 02-six-step/skills-prep.md
    - 应用创建与配置: 02-six-step/app-create.md
    - 提示词编写实战: 02-six-step/prompt-writing.md
  - 场景一·投研自动化:
